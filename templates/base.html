<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kira{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#fff4ed', 100: '#ffe6d4', 200: '#ffc8a3', 300: '#ffa366',
                            400: '#ff7a29', 500: '#f97316', 600: '#ea580c', 700: '#c2410c',
                            800: '#9a3412', 900: '#7c2d12',
                        },
                        surface: {
                            main: '#ffffff', sidebar: '#fbfbfb', bg: '#f1f3f5',
                            hover: '#f4f4f5', card: '#f9f9f9',
                        },
                        text: {
                            primary: '#18181b', secondary: '#52525b',
                            tertiary: '#a1a1aa', muted: '#d4d4d8',
                        },
                        border: {
                            light: '#f4f4f5', default: '#e4e4e7', dark: '#d4d4d8',
                        }
                    },
                    boxShadow: {
                        'app': '0 25px 50px -12px rgba(0, 0, 0, 0.05), 0 0 0 1px rgba(0,0,0,0.02)',
                        'input': '0 8px 20px -8px rgba(0, 0, 0, 0.04), 0 0 0 1px #e4e4e7',
                        'input-focus': '0 8px 24px -8px rgba(249, 115, 22, 0.15), 0 0 0 1px #ffc8a3',
                        'btn': '0 2px 4px rgba(0,0,0,0.02), 0 1px 0 rgba(0,0,0,0.02)',
                        'card': '0 4px 12px -4px rgba(0,0,0,0.03)',
                    },
                    borderRadius: {
                        'xl': '0.75rem', '2xl': '1rem', '3xl': '1.5rem', '4xl': '2rem',
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1)',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                    }
                }
            }
        }
    </script>

    <style>
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: transparent; border-radius: 10px; transition: background-color 0.3s ease; }
        *:hover::-webkit-scrollbar-thumb { background-color: #e4e4e7; }
        ::-webkit-scrollbar-thumb:hover { background-color: #d4d4d8; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        *:focus-visible { outline: 2px solid #ffc8a3; outline-offset: 2px; }
        textarea:focus-visible { outline: none; }
        .interactable { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-panel { background: rgba(251, 251, 251, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        #mic-btn.recording { background: #dc2626 !important; color: white !important; animation: mic-pulse 1s ease-in-out infinite; }
        @keyframes mic-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,0.3)} 50%{box-shadow:0 0 0 8px rgba(220,38,38,0)} }
        .chat-msg { animation: msgIn 0.3s ease; }
        @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

        /* ── Dark Mode ───────────────────────────────────────────────── */
        html.dark body                     { background:#28282c; color:#f4f4f5; }
        html.dark #main-app                { background:#2e2e32; }
        /* Sidebar */
        html.dark #app-sidebar             { background:#28282c !important; border-color:#3a3a3e !important; }
        html.dark .glass-panel             { background:rgba(40,40,44,0.97) !important; border-color:#3a3a3e !important; }
        /* Main */
        html.dark main.flex-1              { background:#2e2e32 !important; }
        html.dark header                   { border-color:#3a3a3e !important; }
        /* Surfaces */
        html.dark .bg-white                { background:#36363b !important; }
        html.dark .bg-surface-bg           { background:#28282c !important; }
        html.dark .bg-surface-sidebar      { background:#28282c !important; }
        html.dark .bg-surface-card         { background:#3c3c41 !important; }
        html.dark .bg-surface-hover        { background:#404045 !important; }
        html.dark .bg-gray-50              { background:#323236 !important; }
        html.dark .bg-gray-100             { background:#3c3c41 !important; }
        /* Borders */
        html.dark .border-border-default   { border-color:#44444a !important; }
        html.dark .border-border-light     { border-color:#3a3a3e !important; }
        html.dark .border-gray-100         { border-color:#44444a !important; }
        html.dark .border-gray-200         { border-color:#44444a !important; }
        html.dark .divide-border-light > * + * { border-color:#3a3a3e !important; }
        /* Text */
        html.dark .text-text-primary       { color:#f4f4f5 !important; }
        html.dark .text-text-secondary     { color:#b4b4bb !important; }
        html.dark .text-text-tertiary      { color:#86868e !important; }
        html.dark .text-gray-900           { color:#f4f4f5 !important; }
        html.dark .text-gray-700           { color:#b4b4bb !important; }
        html.dark .text-gray-500           { color:#86868e !important; }
        /* Hover */
        html.dark .hover\:bg-surface-hover:hover { background:#404045 !important; }
        html.dark .hover\:bg-gray-50:hover       { background:#404045 !important; }
        /* Inputs */
        html.dark input:not([type="checkbox"]):not([type="file"]):not([disabled]) {
            background:#3c3c41 !important; border-color:#52525b !important; color:#f4f4f5 !important;
        }
        html.dark textarea                 { color:#f4f4f5 !important; }
        /* Textareas inside the prompt bar stay transparent */
        html.dark .shadow-input textarea   { background:transparent !important; border:none !important; }
        html.dark input[disabled]          { background:#323236 !important; color:#71717a !important; }
        /* Model dropdown */
        html.dark #modelDropdown           { background:#36363b !important; border-color:#44444a !important; }
        html.dark .model-option:hover      { background:#404045 !important; }
        /* Nav links */
        html.dark a.group:hover, html.dark button.group:hover { color:#f4f4f5 !important; }
        /* Scrollbar in dark */
        html.dark *:hover::-webkit-scrollbar-thumb { background-color:#52525b; }
        /* Profile custom dropdowns */
        html.dark .custom-dd-btn           { background:#3c3c41 !important; border-color:#52525b !important; color:#f4f4f5 !important; }
        html.dark .custom-dd.open .custom-dd-btn { background:#2d1f0e !important; }
        html.dark .custom-dd-panel         { background:#36363b !important; border-color:#44444a !important; box-shadow:0 8px 24px -6px rgba(0,0,0,0.3); }
        html.dark .custom-dd-opt           { color:#b4b4bb !important; }
        html.dark .custom-dd-opt:hover     { background:#404045 !important; color:#f4f4f5 !important; }
        html.dark .custom-dd-opt.active    { background:#2d1f0e !important; }
        /* Theme cards on profile */
        html.dark .theme-card              { background:#3c3c41 !important; color:#b4b4bb; border-color:transparent; }
        html.dark .theme-card:hover        { background:#404045 !important; }
        html.dark .theme-card.selected     { border-color:#f97316 !important; background:#2d1f0e !important; color:#ea580c !important; }
        /* Toast / confirm */
        html.dark #kira-toast              { background:#36363b !important; border-color:#44444a !important; color:#f4f4f5 !important; }
        html.dark #kira-confirm .bg-white  { background:#36363b !important; }
        /* Sidebar nav text */
        html.dark .text-sm.text-text-secondary { color:#b4b4bb; }
        /* Prompt bar inner banner — match container color */
        html.dark .shadow-input .bg-surface-card,
        html.dark #chat-input-container .bg-surface-card { background:#36363b !important; }
        /* Prompt bar — kill white ring from shadow-input + border */
        html.dark .shadow-input            { box-shadow:0 8px 20px -8px rgba(0,0,0,0.3),0 0 0 1px #44444a !important; }
        html.dark .focus-within\:shadow-input-focus:focus-within,
        html.dark .focus-within\:\!shadow-input-focus:focus-within { box-shadow:0 8px 24px -8px rgba(249,115,22,0.15),0 0 0 1px #ffc8a3 !important; }
        html.dark .shadow-input.bg-white,
        html.dark .rounded-\[24px\].bg-white { background:#36363b !important; border-color:#44444a !important; }
        html.dark .hover\:border-border-dark:hover { border-color:#52525b !important; }
    </style>
    <!-- Apply theme before paint to avoid flash -->
    <script>
        (function(){
            if(localStorage.getItem('kira_theme')==='dark') document.documentElement.classList.add('dark');
        })();
    </script>
    {% block head_extra %}{% endblock %}
</head>

<body class="bg-surface-bg min-h-screen text-text-primary antialiased selection:bg-brand-100 selection:text-brand-700 overflow-hidden">

    <div id="main-app" class="bg-surface-main w-full h-screen flex overflow-hidden relative">

        <!-- ==================== SIDEBAR ==================== -->
        <aside id="app-sidebar" class="w-[280px] bg-surface-sidebar border-r border-border-default flex flex-col flex-shrink-0 transition-all duration-300 ease-in-out relative z-20">

            <!-- Sidebar Header -->
            <div class="px-5 py-5 flex items-center justify-between">
                <a href="/" class="flex items-center gap-2.5 cursor-pointer group no-underline">
                    <img src="/static/Kira.png" alt="Kira Logo" width="50" height="50" class="group-hover:scale-105 transition-transform duration-300">
                    <span class="text-[20px] font-bold tracking-tight text-text-primary">Kira</span>
                </a>
                <button id="toggle-sidebar-btn" class="text-text-tertiary hover:text-text-primary hover:bg-surface-hover p-1.5 rounded-md transition-colors border border-transparent hover:border-border-default focus:outline-none" aria-label="Toggle Sidebar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 12H5M5 12L12 19M5 12L12 5"/>
                        <path d="M21 5v14" stroke-width="2"/>
                    </svg>
                </button>
            </div>

            <!-- New Chat Button -->
            <div class="px-5 pb-4">
                <a href="/" id="new-chat-btn" class="w-full bg-brand-500 hover:bg-brand-600 active:bg-brand-700 text-white font-semibold text-sm py-2.5 px-3.5 rounded-[10px] flex items-center justify-between transition-all shadow-btn shadow-brand-500/20 group no-underline">
                    <div class="flex items-center gap-2">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="group-hover:rotate-90 transition-transform duration-300">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        {{ T.new_chat }}
                    </div>
                    <div class="bg-white/20 text-white text-[10px] px-1.5 py-0.5 rounded font-bold tracking-wider border border-white/10 flex items-center gap-1">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3H6a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3 3 3 0 0 0 3 3h12a3 3 0 0 0 3-3 3 3 0 0 0-3-3z"></path></svg>
                        N
                    </div>
                </a>
            </div>

            <!-- Navigation Links -->
            <nav class="px-3 flex flex-col gap-1 pb-4 border-b border-border-light mx-2">
                <a href="/audio" class="group flex items-center gap-3 text-sm text-text-secondary font-semibold px-3 py-2 rounded-xl hover:bg-surface-hover hover:text-text-primary transition-all">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-text-tertiary group-hover:text-text-primary transition-colors"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                    {{ T.audio_chat }}
                </a>
            </nav>

            <!-- Chat History -->
            <div id="chat-history-sidebar" class="flex-1 overflow-y-auto hide-scrollbar px-5 py-5 pb-20">
                <div id="chat-history-list">
                    <p class="text-[12px] text-text-tertiary text-center py-4">No conversations yet.</p>
                </div>
            </div>

            <!-- Sidebar Footer -->
            <div class="mt-auto glass-panel border-t border-border-light p-3 flex flex-col gap-1 absolute bottom-0 w-full z-30">
                <a href="/profile" class="group flex items-center gap-3 text-sm text-text-secondary font-semibold px-2 py-2 rounded-xl hover:bg-surface-hover transition-all">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-text-tertiary group-hover:rotate-45 transition-transform duration-300"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    {{ T.settings }}
                </a>
                <div class="flex items-center justify-between p-2 rounded-xl hover:bg-surface-hover transition-colors cursor-pointer border border-border-default shadow-sm bg-white group mt-1">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-brand-500 flex items-center justify-center flex-shrink-0 overflow-hidden relative" id="sidebar-avatar">
                            <img id="sidebar-avatar-img" src="" alt="" class="w-full h-full object-cover absolute inset-0 hidden">
                            <span id="sidebar-avatar-initials" class="text-white text-sm font-bold">{{ display_initial }}</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[13px] font-bold text-text-primary leading-tight" id="sidebar-display-name">{{ display_name }}</span>
                            <span class="text-[11px] text-text-tertiary font-semibold mt-0.5">{{ T.free }}</span>
                        </div>
                    </div>
                    <div class="text-text-tertiary flex flex-col -space-y-1.5 group-hover:text-text-secondary">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </div>
                </div>
            </div>
        </aside>

        <!-- ==================== MAIN CONTENT ==================== -->
        <main class="flex-1 flex flex-col bg-surface-main relative z-10 w-full overflow-hidden">

            <!-- Top Header Navbar -->
            <header class="h-[60px] flex items-center justify-between px-6 py-2 flex-shrink-0 border-b border-transparent z-20">
                <!-- Model Selector Dropdown -->
                <div class="relative" id="modelSelectorWrapper">
                    <button onclick="toggleModelDropdown()" class="flex items-center gap-2.5 cursor-pointer hover:bg-surface-hover px-3 py-1.5 rounded-xl transition-colors border border-transparent hover:border-border-default">
                        <div id="selectedModelLogo" class="w-6 h-6 flex items-center justify-center"></div>
                        <span id="selectedModelName" class="text-text-primary font-bold text-sm tracking-wide">Claude Sonnet 4</span>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-text-tertiary transition-transform duration-200" id="modelChevron"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </button>

                    <!-- Dropdown Menu -->
                    <div id="modelDropdown" class="hidden absolute top-full left-0 mt-1.5 w-[280px] bg-white rounded-2xl border border-border-default shadow-lg z-50 py-1.5 animate-fade-in">
                        <div class="px-3 py-2 text-[11px] font-semibold text-text-tertiary uppercase tracking-wider">{{ T.select_model }}</div>

                        <button onclick="selectModel('claude-sonnet', 'Claude Sonnet 4', 'claude')" class="model-option w-full flex items-center gap-3 px-3 py-2.5 hover:bg-surface-hover transition-colors rounded-lg mx-0" data-model="claude-sonnet">
                            <div class="w-9 h-9 rounded-xl bg-[#D97757]/10 flex items-center justify-center flex-shrink-0"><svg width="22" height="22" fill="#D97757" viewBox="0 0 16 16"><path d="m3.127 10.604 3.135-1.76.053-.153-.053-.085H6.11l-.525-.032-1.791-.048-1.554-.065-1.505-.08-.38-.081L0 7.832l.036-.234.32-.214.455.04 1.009.069 1.513.105 1.097.064 1.626.17h.259l.036-.105-.089-.065-.068-.064-1.566-1.062-1.695-1.121-.887-.646-.48-.327-.243-.306-.104-.67.435-.48.585.04.15.04.593.456 1.267.981 1.654 1.218.242.202.097-.068.012-.049-.109-.181-.9-1.626-.96-1.655-.428-.686-.113-.411a2 2 0 0 1-.068-.484l.496-.674L4.446 0l.662.089.279.242.411.94.666 1.48 1.033 2.014.302.597.162.553.06.17h.105v-.097l.085-1.134.157-1.392.154-1.792.052-.504.25-.605.497-.327.387.186.319.456-.045.294-.19 1.23-.37 1.93-.243 1.29h.142l.161-.16.654-.868 1.097-1.372.484-.545.565-.601.363-.287h.686l.505.751-.226.775-.707.895-.585.759-.839 1.13-.524.904.048.072.125-.012 1.897-.403 1.024-.186 1.223-.21.553.258.06.263-.218.536-1.307.323-1.533.307-2.284.54-.028.02.032.04 1.029.098.44.024h1.077l2.005.15.525.346.315.424-.053.323-.807.411-3.631-.863-.872-.218h-.12v.073l.726.71 1.331 1.202 1.667 1.55.084.383-.214.302-.226-.032-1.464-1.101-.565-.497-1.28-1.077h-.084v.113l.295.432 1.557 2.34.08.718-.112.234-.404.141-.444-.08-.911-1.28-.94-1.44-.759-1.291-.093.053-.448 4.821-.21.246-.484.186-.403-.307-.214-.496.214-.98.258-1.28.21-1.016.19-1.263.112-.42-.008-.028-.092.012-.953 1.307-1.448 1.957-1.146 1.227-.274.109-.477-.247.045-.44.266-.39 1.586-2.018.956-1.25.617-.723-.004-.105h-.036l-4.212 2.736-.75.096-.324-.302.04-.496.154-.162 1.267-.871z"/></svg></div>
                            <div class="flex flex-col items-start"><span class="text-sm font-semibold text-text-primary">Claude Sonnet 4</span><span class="text-[11px] text-text-tertiary">Anthropic - Fast & smart</span></div>
                            <svg class="model-check ml-auto w-4 h-4 text-brand-500 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>

        let currentModel = 'claude-sonnet';

        function toggleModelDropdown() {
            const dd = document.getElementById('modelDropdown');
            const ch = document.getElementById('modelChevron');
            dd.classList.toggle('hidden');
            ch.style.transform = dd.classList.contains('hidden') ? '' : 'rotate(180deg)';
        }

        function selectModel(modelId, modelName, provider) {
            currentModel = modelId;
            document.getElementById('selectedModelName').textContent = modelName;
            document.getElementById('selectedModelLogo').innerHTML = modelLogos[provider] || '';
            document.querySelectorAll('.model-option .model-check').forEach(el => el.classList.add('hidden'));
            var btn = document.querySelector('.model-option[data-model="' + modelId + '"]');
            if (btn) btn.querySelector('.model-check').classList.remove('hidden');
            toggleModelDropdown();
        }

        document.addEventListener('click', function(e) {
            var w = document.getElementById('modelSelectorWrapper');
            if (w && !w.contains(e.target)) {
                document.getElementById('modelDropdown').classList.add('hidden');
                document.getElementById('modelChevron').style.transform = '';
            }
        });

        function escapeHtml(t) { var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        // Sidebar toggle
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('selectedModelLogo').innerHTML = modelLogos['claude'];
            var ab = document.querySelector('.model-option[data-model="claude-sonnet"]');
            if (ab) ab.querySelector('.model-check').classList.remove('hidden');

            var sidebar = document.getElementById('app-sidebar');
            document.getElementById('toggle-sidebar-btn').addEventListener('click', function() {
                if (sidebar.style.width === '0px') {
                    sidebar.style.width = '280px'; sidebar.style.minWidth = '280px'; sidebar.style.opacity = '1'; sidebar.style.overflow = '';
                } else {
                    sidebar.style.width = '0px'; sidebar.style.minWidth = '0px'; sidebar.style.opacity = '0'; sidebar.style.overflow = 'hidden';
                }
            });

            // Check model availability (live)
            function checkModels() {
                fetch('/api/models').then(r => r.json()).then(function(models) {
                    document.querySelectorAll('.model-option').forEach(function(btn) {
                        var modelId = btn.dataset.model;
                        var info = models[modelId];
                        if (!info) return;
                        var desc = btn.querySelector('.text-\\[11px\\]');
                        // Reset first
                        btn.style.opacity = '';
                        btn.style.pointerEvents = '';
                        btn.title = '';
                        if (desc) desc.style.color = '';

                        if (!info.available) {
                            btn.style.opacity = '0.35';
                            btn.style.pointerEvents = 'none';
                            btn.title = info.reason || 'Unavailable';
                            if (desc) {
                                // Remove old status badge
                                var old = desc.querySelector('.model-status');
                                if (old) old.remove();
                                var badge = document.createElement('span');
                                badge.className = 'model-status ml-1 text-red-400 font-semibold';
                                badge.textContent = '— ' + (info.reason || 'Unavailable');
                                desc.appendChild(badge);
                            }
                            // If currently selected model became unavailable, switch to first available
                            if (currentModel === modelId) {
                                for (var mid in models) {
                                    if (models[mid].available) {
                                        var fallback = document.querySelector('.model-option[data-model="' + mid + '"]');
                                        if (fallback) fallback.click();
                                        break;
                                    }
                                }
                            }
                        } else {
                            // Remove old status badge if model recovered
                            if (desc) {
                                var old = desc.querySelector('.model-status');
                                if (old) old.remove();
                            }
                        }
                    });
                }).catch(function(){});
            }
            checkModels();
            // Re-check every 60 seconds
            setInterval(checkModels, 60000);
        });
    </script>

    <!-- Shared mode toggle logic -->
    <script>
        // Active modes (only one at a time)
        let activeMode = 'normal'; // normal, research, image, think

        function toggleMode(mode, btnId) {
            var btn = document.getElementById(btnId);
            if (!btn) return;

            if (activeMode === mode) {
                // Deactivate
                activeMode = 'normal';
                deactivateBtn(btnId, mode);
            } else {
                // Deactivate previous
                deactivateBtn('btn-research', 'research');
                deactivateBtn('btn-image', 'image');
                deactivateBtn('btn-think', 'think');
                // Activate new
                activeMode = mode;
                activateBtn(btnId, mode);
            }
        }

        function activateBtn(btnId, mode) {
            var btn = document.getElementById(btnId);
            if (!btn) return;
            var colors = {
                research: { bg: 'bg-brand-50', border: 'border-brand-100', text: 'text-brand-600' },
                image: { bg: 'bg-violet-50', border: 'border-violet-200', text: 'text-violet-600' },
                think: { bg: 'bg-amber-50', border: 'border-amber-200', text: 'text-amber-600' },
            };
            var c = colors[mode];
            btn.className = btn.className
                .replace('text-text-tertiary', c.text)
                .replace('hover:text-text-secondary', '')
                .replace('hover:bg-surface-hover', '');
            if (mode === 'research') {
                btn.className = 'flex items-center gap-1.5 ' + c.bg + ' border ' + c.border + ' ' + c.text + ' px-3.5 py-1.5 rounded-[10px] text-[13px] font-bold transition-colors';
            } else {
                btn.classList.add(c.bg, c.border, c.text, 'border', 'rounded-xl');
                btn.classList.remove('text-text-tertiary');
            }
        }

        function deactivateBtn(btnId, mode) {
            var btn = document.getElementById(btnId);
            if (!btn) return;
            if (mode === 'research') {
                btn.className = 'flex items-center gap-1.5 bg-white border border-border-default text-text-secondary hover:bg-surface-hover px-3.5 py-1.5 rounded-[10px] text-[13px] font-bold transition-colors';
            } else {
                btn.className = 'text-text-tertiary hover:text-text-secondary p-2 hover:bg-surface-hover rounded-xl transition-colors tooltip-trigger';
            }
        }

        function getActiveMode() { return activeMode; }
    </script>

    <script>
        // --- Toast ---
        var _toastTimer = null;
        function showToast(message, type) {
            var toast = document.getElementById('kira-toast');
            var icon = document.getElementById('kira-toast-icon');
            var text = document.getElementById('kira-toast-text');
            text.textContent = message;
            if (type === 'error') {
                toast.style.borderColor = '#fca5a5';
                icon.className = 'w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 bg-red-50';
                icon.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
            } else if (type === 'success') {
                toast.style.borderColor = '#86efac';
                icon.className = 'w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 bg-green-50';
                icon.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
            } else {
                toast.style.borderColor = '#e4e4e7';
                icon.className = 'w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 bg-brand-50';
                icon.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
            }
            toast.classList.remove('opacity-0', '-translate-y-4', 'pointer-events-none');
            toast.classList.add('opacity-100', 'translate-y-0', 'pointer-events-auto');
            clearTimeout(_toastTimer);
            _toastTimer = setTimeout(hideToast, 4000);
        }
        function hideToast() {
            var toast = document.getElementById('kira-toast');
            toast.classList.add('opacity-0', '-translate-y-4', 'pointer-events-none');
            toast.classList.remove('opacity-100', 'translate-y-0', 'pointer-events-auto');
        }

        // --- Confirm ---
        var _confirmResolve = null;
        function showConfirm(message, btnText, btnColor) {
            document.getElementById('kira-confirm-text').textContent = message;
            var btn = document.getElementById('kira-confirm-btn');
            btn.textContent = btnText || 'Confirm';
            btn.className = 'flex-1 py-2.5 rounded-xl text-sm font-bold transition-colors text-white ' + (btnColor || 'bg-red-500 hover:bg-red-600');
            document.getElementById('kira-confirm').classList.remove('hidden');
            return new Promise(function(resolve) { _confirmResolve = resolve; });
        }
        function resolveConfirm(value) {
            document.getElementById('kira-confirm').classList.add('hidden');
            if (_confirmResolve) { _confirmResolve(value); _confirmResolve = null; }
        }
    </script>

    <script>
        (function () {
            const av = localStorage.getItem('kira_avatar');
            if (av) {
                const img = document.getElementById('sidebar-avatar-img');
                const initials = document.getElementById('sidebar-avatar-initials');
                if (img) { img.src = av; img.classList.remove('hidden'); }
                if (initials) initials.classList.add('hidden');
            }
        })();

        // Load chat history into sidebar — available on every page
        async function loadChatHistory() {
            try {
                var res = await fetch('/api/conversations');
                var convs = await res.json();
                var container = document.getElementById('chat-history-list');
                if (!container) return;
                if (!convs.length) {
                    container.innerHTML = '<p class="text-[12px] text-text-tertiary text-center py-4">No conversations yet.</p>';
                    return;
                }
                var html = '<div class="mb-4"><h3 class="text-[11px] font-bold text-text-tertiary tracking-wider mb-3 uppercase">Conversations</h3><ul class="flex flex-col gap-0.5 -mx-2">';
                convs.forEach(function(c) {
                    html += '<li class="flex items-center group">';
                    html += '<a href="/chat/' + c.id + '" class="flex-1 block px-2 py-1.5 text-[13px] text-text-secondary font-medium hover:text-text-primary hover:bg-surface-hover rounded-lg truncate transition-colors">' + escapeHtml(c.title) + '</a>';
                    html += '<button onclick="deleteConv(\'' + c.id + '\'); return false;" class="opacity-0 group-hover:opacity-100 p-1 text-text-tertiary hover:text-red-500 transition-all rounded" title="Delete">';
                    html += '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>';
                    html += '</button></li>';
                });
                html += '</ul></div>';
                container.innerHTML = html;
            } catch(err) {}
        }
        async function deleteConv(id) {
            await fetch('/api/conversations/' + id, { method: 'DELETE' });
            loadChatHistory();
        }

        document.addEventListener('DOMContentLoaded', loadChatHistory);
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
